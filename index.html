<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌟 Feliz Cumpleaños Pulguita 🌟</title>

<style>
body{
    margin:0;
    background: linear-gradient(135deg,#ff9ec4,#ffd6a5);
    font-family: 'Segoe UI', sans-serif;
    overflow-x:hidden;
    text-align:center;
}

/* TEXTO FELIZ CUMPLEAÑOS */
#titulo{
    font-size:60px;
    color:white;
    margin-top:20px;
    opacity:0;
    animation: aparecer 3s forwards;
    animation-delay:1s;
}

@keyframes aparecer{
    from{opacity:0; transform: translateY(-40px);}
    to{opacity:1; transform: translateY(0);}
}

/* PASTEL */
.cake{
    position:relative;
    width:200px;
    margin:40px auto;
    animation: flotar 3s infinite ease-in-out;
}

@keyframes flotar{
    0%,100%{ transform:translateY(0);}
    50%{ transform:translateY(-15px);}
}

.base{
    width:200px;
    height:80px;
    background:#ff6f91;
    border-radius:10px;
}
.capa{
    width:160px;
    height:60px;
    background:#ffc75f;
    margin:0 auto;
    border-radius:10px;
    margin-top:-20px;
}
.velas{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:-15px;
}
.vela{
    width:10px;
    height:30px;
    background:white;
    position:relative;
}
.vela::after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    background:orange;
    border-radius:50%;
    top:-10px;
    animation: fuego 1s infinite alternate;
}
@keyframes fuego{
    from{transform:scale(1);}
    to{transform:scale(1.3);}
}

/* GALERIA */
#galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin:40px;
}
.foto{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    opacity:0;
    transform:scale(0.5);
    animation: aparecerFoto 1s forwards;
}
@keyframes aparecerFoto{
    to{ opacity:1; transform:scale(1);}
}

/* BOTON MUSICA */
#playBtn{
    padding:10px 20px;
    border:none;
    background:#ff4d6d;
    color:white;
    border-radius:20px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1 id="titulo">🌟 Feliz Cumpleaños Pulguita 🌟</h1>

<!-- Pastel -->
<div class="cake" id="cakeBtn">
    <div class="velas">
        <div class="vela"></div>
        <div class="vela"></div>
        <div class="vela"></div>
    </div>
    <div class="capa"></div>
    <div class="base"></div>
</div>

<button id="playBtn">▶ Reproducir música</button>

<div id="galeria"></div>

<!-- MUSICA -->
<audio id="musica" loop>
    <source src="cumple.mp3" type="audio/mpeg">
</audio>

<script>
    const musica = document.getElementById("musica");
    const cake = document.getElementById("cakeBtn");
    
    let musicaIniciada = false;
    
    /* ===============================
       GALERIA DE FOTOS
    ================================*/
    const imagenes = [
        "foto1.jpg","foto2.jpg","foto3.jpg",
        "foto4.jpg","foto5.jpg","foto6.jpg"
    ];
    
    let index = 0;
    
    function mostrarImagen(){
        if(index >= imagenes.length) return;
    
        const img = document.createElement("img");
        img.src = imagenes[index];
        img.className = "foto";
        document.getElementById("galeria").appendChild(img);
        index++;
    }
    
    /* ===============================
       💖 CORAZON DE ROSAS PERFECTO
    ================================*/
    function crearRosas(){
    
        // evitar duplicados si hacen click otra vez
        if(document.getElementById("contenedorCorazon")) return;
    
        const contenedor = document.createElement("div");
        contenedor.id = "contenedorCorazon";
        document.body.appendChild(contenedor);
    
        const totalRosas = 90;
        const escala = 11; // tamaño del corazón
    
        for(let i=0;i<totalRosas;i++){
    
            const t = (i/totalRosas) * Math.PI * 2;
    
            // ECUACION CARDIOIDE ❤️
            const x = 16*Math.pow(Math.sin(t),3);
            const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    
            const rosa = document.createElement("div");
            rosa.className = "rosaCorazon";
            rosa.innerHTML = "🌹";
    
            // POSICION REAL dentro del contenedor
            rosa.style.left = (210 + x*escala) + "px";
            rosa.style.top  = (190 - y*escala) + "px";
            rosa.style.animationDelay = (i*0.02) + "s";
    
            contenedor.appendChild(rosa);
        }
    
        // 💕 FOTO CENTRAL
        const foto = document.createElement("img");
        foto.id = "fotoCentral";
        foto.src = "fotoCentral.jpg";
        contenedor.appendChild(foto);
    }
    
    /* ===============================
       🎂 CLICK EN EL PASTEL
    ================================*/
    cake.addEventListener("click", ()=>{
    
        if(!musicaIniciada){
            musica.play();
            musicaIniciada = true;
        }
    
        crearRosas();
    
        // iniciar galeria
        setTimeout(()=>{
            mostrarImagen();
            setInterval(mostrarImagen,5000);
        },2500);
    });
    </script>
</body>
</html>
